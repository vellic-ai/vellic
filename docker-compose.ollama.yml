# Overlay: run Ollama alongside the core stack.
# Usage: docker compose -f docker-compose.yml -f docker-compose.ollama.yml up -d
services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks: [vellic]
    entrypoint: ["/bin/sh", "-c"]
    command: "ollama serve & until ollama list 2>/dev/null; do sleep 2; done; ollama pull $${OLLAMA_MODEL:-nomic-embed-text}; wait"
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  ollama_data:
