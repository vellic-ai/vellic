apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: vellic
  labels:
    app.kubernetes.io/name: vellic-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vellic-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vellic-worker
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: worker
          image: ghcr.io/dmitriypru/vellic/worker:latest
          ports:
            - name: health
              containerPort: 8002
          envFrom:
            - configMapRef:
                name: worker-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: worker-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: worker-secrets
                  key: REDIS_URL
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
