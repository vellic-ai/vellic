apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: vellic
  labels:
    app.kubernetes.io/name: vellic-admin
    app.kubernetes.io/component: admin
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vellic-admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vellic-admin
        app.kubernetes.io/component: admin
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: admin
          image: ghcr.io/dmitriypru/vellic/admin:latest
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: admin-config
            - secretRef:
                name: admin-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
