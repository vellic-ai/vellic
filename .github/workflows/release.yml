name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/vellic

permissions:
  contents: write
  packages: write

jobs:
  build-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: build-push
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start stack
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            up --build -d --wait
        env:
          POSTGRES_PASSWORD: vellic_ci
          GITHUB_WEBHOOK_SECRET: ci-smoke-secret

      - name: Smoke assertions
        run: |
          set -euo pipefail

          check() {
            echo -n "  → $1 ... "
            curl -sf "$1" -o /dev/null && echo "OK" || { echo "FAIL"; exit 1; }
          }

          echo "Service health endpoints:"
          check http://localhost:8000/health
          check http://localhost:8001/health
          check http://localhost:8002/health

          echo "Nginx frontend (SPA):"
          check http://localhost/

          echo "Webhook acceptance endpoint:"
          STATUS=$(curl -so /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/webhook/github \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: ping" \
            -H "X-GitHub-Delivery: smoke-$(date +%s)" \
            -H "X-Hub-Signature-256: sha256=invalid" \
            -d '{"zen":"test"}')
          if [ "$STATUS" = "000" ]; then
            echo "  FAIL: webhook endpoint unreachable"
            exit 1
          fi
          echo "  OK (status=$STATUS — endpoint reachable, auth enforced)"

          echo "Migration check (/admin/stats must not return 503):"
          STATUS=$(curl -so /dev/null -w "%{http_code}" http://localhost:8001/admin/stats)
          if [ "$STATUS" = "503" ]; then
            echo "  FAIL: /admin/stats returned 503 — migrations did not run"
            exit 1
          fi
          echo "  OK (status=$STATUS)"

      - name: Dump service logs on failure
        if: failure()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            logs --tail=100
        env:
          POSTGRES_PASSWORD: vellic_ci
          GITHUB_WEBHOOK_SECRET: ci-smoke-secret

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            NOTES=$(git log HEAD --pretty=format:"- %s (%h)" --no-merges | head -20)
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.notes }}

            ## Docker Images

            Images published to GHCR:
            - `ghcr.io/${{ github.repository_owner }}/vellic/api:${{ steps.version.outputs.version }}`
            - `ghcr.io/${{ github.repository_owner }}/vellic/worker:${{ steps.version.outputs.version }}`
            - `ghcr.io/${{ github.repository_owner }}/vellic/admin:${{ steps.version.outputs.version }}`
