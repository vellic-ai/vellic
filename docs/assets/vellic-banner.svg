<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="120" rx="12" fill="url(#bg)"/>

  <!-- Decorative side bar -->
  <rect x="0" y="0" width="4" height="120" rx="2" fill="url(#accent)"/>

  <!-- Logo mark: abstract code-review chevron -->
  <g transform="translate(32, 34)">
    <polyline points="0,26 12,0 24,26" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="5" y1="18" x2="19" y2="18" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="72" y="68" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="42" font-weight="700" letter-spacing="-1" fill="white">vellic</text>

  <!-- Tagline -->
  <text x="72" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8" letter-spacing="0.5">AI integration platform for developer workflows</text>

  <!-- Right badge -->
  <rect x="484" y="42" width="96" height="26" rx="6" fill="#6366f120"/>
  <text x="532" y="59" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#818cf8" letter-spacing="0.5">open source</text>
</svg>
