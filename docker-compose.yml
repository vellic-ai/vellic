version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vellic
      POSTGRES_PASSWORD: vellic
      POSTGRES_DB: vellic
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vellic"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
      target: builder
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./api/app:/app/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://vellic:vellic@postgres:5432/vellic
      REDIS_URL: redis://redis:6379
      PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./worker
      target: builder
    command: python -m app.main
    volumes:
      - ./worker/app:/app/app
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://vellic:vellic@postgres:5432/vellic
      REDIS_URL: redis://redis:6379
      HEALTH_PORT: "8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: ./admin
      target: builder
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./admin/app:/app/app
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://vellic:vellic@postgres:5432/vellic
      REDIS_URL: redis://redis:6379
      PORT: "8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
