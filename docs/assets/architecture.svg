<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480" font-family="ui-sans-serif, system-ui, sans-serif">
  <!-- Background -->
  <rect width="820" height="480" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="410" y="30" fill="#e6edf3" font-size="15" font-weight="bold" text-anchor="middle">vellic — System Architecture</text>

  <!-- ====== VCS Sources (left) ====== -->
  <rect x="20" y="55" width="120" height="100" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="80" fill="#8b949e" font-size="10" text-anchor="middle">VCS Platform</text>
  <rect x="35" y="88" width="90" height="18" rx="3" fill="#21262d"/>
  <text x="80" y="100" fill="#58a6ff" font-size="10" text-anchor="middle">GitHub</text>
  <rect x="35" y="112" width="90" height="18" rx="3" fill="#21262d"/>
  <text x="80" y="124" fill="#58a6ff" font-size="10" text-anchor="middle">GitLab</text>
  <rect x="35" y="136" width="90" height="18" rx="3" fill="#21262d"/>
  <text x="80" y="148" fill="#8b949e" font-size="10" text-anchor="middle">Bitbucket / custom</text>

  <!-- Arrow: VCS → api -->
  <line x1="140" y1="105" x2="196" y2="105" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="168" y="99" fill="#8b949e" font-size="9" text-anchor="middle">POST /webhook</text>
  <text x="168" y="112" fill="#8b949e" font-size="9" text-anchor="middle">HMAC-SHA256</text>

  <!-- ====== api service ====== -->
  <rect x="196" y="60" width="130" height="90" rx="6" fill="#1c2b41" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="261" y="82" fill="#58a6ff" font-size="12" font-weight="bold" text-anchor="middle">api</text>
  <text x="261" y="96" fill="#8b949e" font-size="9" text-anchor="middle">FastAPI · port 8000</text>
  <text x="261" y="112" fill="#c9d1d9" font-size="9" text-anchor="middle">• HMAC validation</text>
  <text x="261" y="126" fill="#c9d1d9" font-size="9" text-anchor="middle">• deduplication</text>
  <text x="261" y="140" fill="#c9d1d9" font-size="9" text-anchor="middle">• DB write + enqueue</text>

  <!-- Arrow: api → Redis -->
  <line x1="326" y1="105" x2="382" y2="105" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="354" y="99" fill="#8b949e" font-size="9" text-anchor="middle">enqueue</text>
  <text x="354" y="112" fill="#8b949e" font-size="9" text-anchor="middle">Arq job</text>

  <!-- ====== Redis ====== -->
  <rect x="382" y="78" width="90" height="54" rx="6" fill="#1a1f2e" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="427" y="100" fill="#79c0ff" font-size="11" font-weight="bold" text-anchor="middle">Redis</text>
  <text x="427" y="116" fill="#8b949e" font-size="9" text-anchor="middle">Arq queue</text>
  <text x="427" y="128" fill="#8b949e" font-size="9" text-anchor="middle">port 6379</text>

  <!-- Arrow: Redis → worker -->
  <line x1="472" y1="105" x2="528" y2="105" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="99" fill="#8b949e" font-size="9" text-anchor="middle">dequeue</text>
  <text x="500" y="112" fill="#8b949e" font-size="9" text-anchor="middle">job</text>

  <!-- ====== worker service ====== -->
  <rect x="528" y="50" width="160" height="224" rx="6" fill="#1a2a1e" stroke="#3fb950" stroke-width="1.5"/>
  <text x="608" y="72" fill="#3fb950" font-size="12" font-weight="bold" text-anchor="middle">worker</text>
  <text x="608" y="86" fill="#8b949e" font-size="9" text-anchor="middle">Arq · port 8002 (health)</text>

  <!-- Pipeline stages -->
  <rect x="544" y="96" width="128" height="22" rx="3" fill="#21262d"/>
  <text x="608" y="110" fill="#e6edf3" font-size="9" text-anchor="middle">① diff fetch</text>
  <line x1="608" y1="118" x2="608" y2="128" stroke="#30363d" stroke-width="1" marker-end="url(#arrow-small)"/>

  <rect x="544" y="128" width="128" height="22" rx="3" fill="#21262d"/>
  <text x="608" y="142" fill="#e6edf3" font-size="9" text-anchor="middle">② context gather</text>
  <line x1="608" y1="150" x2="608" y2="160" stroke="#30363d" stroke-width="1" marker-end="url(#arrow-small)"/>

  <rect x="544" y="160" width="128" height="22" rx="3" fill="#21262d"/>
  <text x="608" y="174" fill="#e6edf3" font-size="9" text-anchor="middle">③ LLM analysis</text>
  <line x1="608" y1="182" x2="608" y2="192" stroke="#30363d" stroke-width="1" marker-end="url(#arrow-small)"/>

  <rect x="544" y="192" width="128" height="22" rx="3" fill="#21262d"/>
  <text x="608" y="206" fill="#e6edf3" font-size="9" text-anchor="middle">④ VCS feedback post</text>

  <!-- MCP label inside worker -->
  <text x="608" y="236" fill="#8b949e" font-size="9" text-anchor="middle">MCP subprocesses</text>
  <rect x="554" y="242" width="108" height="18" rx="3" fill="#1f2d2f" stroke="#3fb950" stroke-width="0.5"/>
  <text x="608" y="253" fill="#8b949e" font-size="9" text-anchor="middle">per-repo tool servers</text>

  <!-- Arrow: worker → LLM -->
  <line x1="688" y1="175" x2="730" y2="175" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="709" y="169" fill="#8b949e" font-size="8" text-anchor="middle">LLM</text>
  <text x="709" y="181" fill="#8b949e" font-size="8" text-anchor="middle">API call</text>

  <!-- ====== LLM Providers (right) ====== -->
  <rect x="730" y="118" width="72" height="114" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="766" y="136" fill="#8b949e" font-size="9" text-anchor="middle">LLM</text>
  <rect x="740" y="142" width="52" height="14" rx="2" fill="#21262d"/>
  <text x="766" y="152" fill="#c9d1d9" font-size="8" text-anchor="middle">Ollama</text>
  <rect x="740" y="160" width="52" height="14" rx="2" fill="#21262d"/>
  <text x="766" y="170" fill="#c9d1d9" font-size="8" text-anchor="middle">vLLM</text>
  <rect x="740" y="178" width="52" height="14" rx="2" fill="#21262d"/>
  <text x="766" y="188" fill="#c9d1d9" font-size="8" text-anchor="middle">OpenAI</text>
  <rect x="740" y="196" width="52" height="14" rx="2" fill="#21262d"/>
  <text x="766" y="206" fill="#c9d1d9" font-size="8" text-anchor="middle">Anthropic</text>
  <rect x="740" y="214" width="52" height="14" rx="2" fill="#21262d"/>
  <text x="766" y="224" fill="#c9d1d9" font-size="8" text-anchor="middle">Claude Code</text>

  <!-- Arrow: worker → VCS (review post, bottom right) -->
  <line x1="608" y1="274" x2="608" y2="304" stroke="#30363d" stroke-width="1.5"/>
  <line x1="608" y1="304" x2="80" y2="304" stroke="#30363d" stroke-width="1.5"/>
  <line x1="80" y1="304" x2="80" y2="240" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="344" y="298" fill="#8b949e" font-size="9" text-anchor="middle">Reviews API — inline comments posted back to PR</text>

  <!-- ====== Postgres ====== -->
  <rect x="196" y="220" width="130" height="72" rx="6" fill="#1a1f2e" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="261" y="244" fill="#79c0ff" font-size="11" font-weight="bold" text-anchor="middle">postgres</text>
  <text x="261" y="260" fill="#8b949e" font-size="9" text-anchor="middle">port 5432 (internal)</text>
  <text x="261" y="275" fill="#8b949e" font-size="9" text-anchor="middle">PRs · jobs · rules</text>
  <text x="261" y="288" fill="#8b949e" font-size="9" text-anchor="middle">encrypted secrets</text>

  <!-- Arrow: api → postgres -->
  <line x1="261" y1="150" x2="261" y2="220" stroke="#30363d" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- Arrow: worker → postgres -->
  <line x1="528" y1="220" x2="326" y2="268" stroke="#30363d" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- ====== admin service ====== -->
  <rect x="382" y="220" width="130" height="90" rx="6" fill="#1c2b41" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="447" y="242" fill="#58a6ff" font-size="12" font-weight="bold" text-anchor="middle">admin</text>
  <text x="447" y="256" fill="#8b949e" font-size="9" text-anchor="middle">FastAPI · port 8001</text>
  <text x="447" y="272" fill="#c9d1d9" font-size="9" text-anchor="middle">• auth + session</text>
  <text x="447" y="286" fill="#c9d1d9" font-size="9" text-anchor="middle">• stats + settings</text>
  <text x="447" y="300" fill="#c9d1d9" font-size="9" text-anchor="middle">• event replay</text>

  <!-- ====== frontend ====== -->
  <rect x="382" y="328" width="130" height="60" rx="6" fill="#1c2b41" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="447" y="350" fill="#58a6ff" font-size="12" font-weight="bold" text-anchor="middle">frontend</text>
  <text x="447" y="364" fill="#8b949e" font-size="9" text-anchor="middle">Vite + React · nginx · port 80</text>
  <text x="447" y="378" fill="#c9d1d9" font-size="9" text-anchor="middle">Admin SPA</text>

  <!-- Arrow: frontend → admin -->
  <line x1="447" y1="328" x2="447" y2="310" stroke="#30363d" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="456" y="322" fill="#8b949e" font-size="8">REST</text>

  <!-- Arrow: admin → postgres -->
  <line x1="382" y1="265" x2="326" y2="265" stroke="#30363d" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- ====== Annotations ====== -->
  <!-- Internal network boundary -->
  <rect x="165" y="210" width="490" height="208" rx="6" fill="none" stroke="#30363d" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="172" y="425" fill="#8b949e" font-size="9">Docker network (internal — not exposed)</text>

  <!-- User browser -->
  <rect x="248" y="400" width="100" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="298" y="418" fill="#e6edf3" font-size="10" text-anchor="middle">👤 Browser</text>
  <text x="298" y="430" fill="#8b949e" font-size="8" text-anchor="middle">localhost:80</text>
  <line x1="298" y1="400" x2="390" y2="388" stroke="#30363d" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#30363d"/>
    </marker>
    <marker id="arrow-small" markerWidth="6" markerHeight="6" refX="5" refY="2" orient="auto">
      <path d="M0,0 L0,4 L6,2 z" fill="#30363d"/>
    </marker>
  </defs>
</svg>
