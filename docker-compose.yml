x-datastore-env: &datastore-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-vellic}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vellic}
  REDIS_URL: redis://redis:6379

x-datastore-deps: &datastore-deps
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

x-python-healthcheck: &python-healthcheck
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 15s

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vellic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vellic}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks: [vellic]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vellic}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [vellic]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: builder
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./api/app:/app/app
      - ./api/alembic:/app/alembic
      - ./api/alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"
    networks: [vellic]
    environment:
      <<: *datastore-env
      PORT: "8000"
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
    depends_on:
      <<: *datastore-deps
    healthcheck:
      <<: *python-healthcheck
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
      target: builder
    command: python -m app.main
    volumes:
      - ./worker/app:/app/app
    ports:
      - "8002:8002"
    networks: [vellic]
    environment:
      <<: *datastore-env
      HEALTH_PORT: "8002"
      LLM_ENCRYPTION_KEY: ${LLM_ENCRYPTION_KEY}
    depends_on:
      <<: *datastore-deps
      api:
        condition: service_healthy
    healthcheck:
      <<: *python-healthcheck
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
      target: builder
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./admin/app:/app/app
    ports:
      - "8001:8001"
    networks: [vellic]
    environment:
      <<: *datastore-env
      PORT: "8001"
      VELLIC_ADMIN_V2: ${VELLIC_ADMIN_V2:-1}
      VELLIC_PRESETS_DIR: /app/presets
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LLM_ENCRYPTION_KEY: ${LLM_ENCRYPTION_KEY}
    depends_on:
      <<: *datastore-deps
      api:
        condition: service_healthy
    healthcheck:
      <<: *python-healthcheck
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks: [vellic]
    depends_on:
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  vellic:
    driver: bridge

volumes:
  postgres_data:
