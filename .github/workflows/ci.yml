name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/vellic

jobs:
  lint:
    name: Lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker, admin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ruff-${{ runner.os }}
          restore-keys: pip-ruff-${{ runner.os }}
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check ${{ matrix.service }}/

  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [api, worker, admin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.service }}-${{ hashFiles(format('{0}/pyproject.toml', matrix.service)) }}
          restore-keys: uv-${{ runner.os }}-${{ matrix.service }}-
      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e "${{ matrix.service }}[dev]"
      - name: Run pytest
        run: |
          if [ "${{ matrix.service }}" = "api" ] || [ "${{ matrix.service }}" = "worker" ]; then
            pytest ${{ matrix.service }}/ -v --tb=short \
              --cov=app --cov-report=xml:${{ matrix.service }}/coverage.xml \
              --cov-fail-under=85
          else
            pytest ${{ matrix.service }}/ -v --tb=short
          fi
        env:
          DATABASE_URL: "postgresql://vellic:vellic@localhost:5432/vellic"
          REDIS_URL: "redis://localhost:6379"
      - name: Upload coverage report
        if: ${{ matrix.service == 'api' || matrix.service == 'worker' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage.xml

  build-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, worker, admin]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build (and push on main)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
