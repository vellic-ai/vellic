# CI overrides: replace ollama with a lightweight HTTP stub to avoid pulling
# large model weights in CI. No service depends on ollama being healthy, but
# docker compose --wait requires every service with a healthcheck to pass.
# Frontend healthcheck is overridden to probe nginx directly rather than via
# the /health proxy to admin — the proxy chain is verified by smoke assertions.
services:
  ollama:
    image: alpine
    entrypoint: []
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 3s
      timeout: 2s
      retries: 3
      start_period: 2s

  frontend:
    healthcheck:
      disable: true
