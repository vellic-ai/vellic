<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 160" width="860" height="160" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="860" height="160" fill="#0d1117" rx="10"/>

  <!-- Step boxes -->
  <!-- 1: PR opened -->
  <rect x="20" y="50" width="130" height="60" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <text x="85" y="74" text-anchor="middle" fill="#9ca3af" font-size="11">Developer opens</text>
  <text x="85" y="92" text-anchor="middle" fill="#f9fafb" font-weight="600">Pull Request</text>
  <text x="85" y="107" text-anchor="middle" fill="#6b7280" font-size="10">GitHub / GitLab</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="80" x2="195" y2="80" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="172" y="73" text-anchor="middle" fill="#6b7280" font-size="10">webhook</text>

  <!-- 2: Webhook API -->
  <rect x="195" y="50" width="130" height="60" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <text x="260" y="74" text-anchor="middle" fill="#9ca3af" font-size="11">HMAC validated</text>
  <text x="260" y="92" text-anchor="middle" fill="#f9fafb" font-weight="600">Webhook API</text>
  <text x="260" y="107" text-anchor="middle" fill="#6b7280" font-size="10">port 8000</text>

  <!-- Arrow 2 -->
  <line x1="325" y1="80" x2="370" y2="80" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="347" y="73" text-anchor="middle" fill="#6b7280" font-size="10">enqueue</text>

  <!-- 3: Pipeline -->
  <rect x="370" y="35" width="160" height="90" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="60" text-anchor="middle" fill="#93c5fd" font-size="11">4-stage pipeline</text>
  <text x="450" y="78" text-anchor="middle" fill="#dbeafe" font-weight="600">Worker</text>
  <text x="450" y="97" text-anchor="middle" fill="#93c5fd" font-size="10">diff → context → LLM</text>
  <text x="450" y="112" text-anchor="middle" fill="#93c5fd" font-size="10">→ feedback</text>

  <!-- Arrow 3 -->
  <line x1="530" y1="80" x2="575" y2="80" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="552" y="73" text-anchor="middle" fill="#6b7280" font-size="10">analyze</text>

  <!-- 4: LLM -->
  <rect x="575" y="50" width="120" height="60" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <text x="635" y="74" text-anchor="middle" fill="#9ca3af" font-size="11">Ollama / GPT-4</text>
  <text x="635" y="92" text-anchor="middle" fill="#f9fafb" font-weight="600">LLM Provider</text>
  <text x="635" y="107" text-anchor="middle" fill="#6b7280" font-size="10">BYOK or local</text>

  <!-- Arrow 4 -->
  <line x1="695" y1="80" x2="740" y2="80" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="717" y="73" text-anchor="middle" fill="#6b7280" font-size="10">post</text>

  <!-- 5: Review posted -->
  <rect x="740" y="50" width="100" height="60" rx="8" fill="#14532d" stroke="#16a34a" stroke-width="1.5"/>
  <text x="790" y="74" text-anchor="middle" fill="#86efac" font-size="11">Inline review</text>
  <text x="790" y="92" text-anchor="middle" fill="#dcfce7" font-weight="600">PR Review</text>
  <text x="790" y="107" text-anchor="middle" fill="#86efac" font-size="10">posted ✓</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4b5563"/>
    </marker>
  </defs>
</svg>
